llm:
  model: "hf.co/Vikhrmodels/QVikhr-3-4B-Instruction-GGUF:Q4_K_M"
  endpoint: "http://localhost:11434"
  timeout_seconds: 180

embedding:
  model_path: "models/e5-small-en-ru"
  query_prompt: "query: "
  query_mode: "prefix_text"

rerank:
  model_path: "models/cross-encoder-russian-msmarco"
  kind: "cross_encoder"
  query_prompt: ""
  min_score: 0.12
  top_n: 4

chunk:
  size: 420
  overlap: 63
  min_size: 300
  max_size: 800

retrieval:
  top_k: 24

memory:
  history_n: 12
  enable_summary: false

limits:
  max_context_tokens: 1400

paths:
  history_file: "chat_history.jsonl"
